# Production stack (§6 WS-F). Standalone — NOT layered on docker-compose.yml:
# the dev file publishes Postgres/Redis/MinIO/API to host ports (fine on a
# laptop), which must never happen on a public server (Docker punches its own
# iptables rules, so a host firewall alone would NOT hide them). Here ONLY Caddy
# is exposed (80/443); everything else is reachable only on the internal compose
# network. Keep the service topology in sync with docker-compose.yml when it
# changes (they share the same Dockerfiles and build context).
#
#   cp deploy/.env.prod.example deploy/.env   # then fill DOMAIN, ACME_EMAIL, secrets
#   make prod-up                              # (or the compose command in DEPLOY.md)
name: egeism

x-app-env: &app-env
  DATABASE_URL: postgres://egeism:egeism@postgres:5432/egeism?sslmode=disable
  REDIS_ADDR: redis:6379
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  MINIO_BUCKET: egeism-media
  TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
  TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
  JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in deploy/.env}
  FETCHER_URL: http://fetcher:8090
  # Public origin: powers the bot's «решать на сайте» button AND (via the
  # /api/media fallback) inline figures in rich messages. Derived from DOMAIN.
  WEB_URL: https://${DOMAIN:?set DOMAIN in deploy/.env}
  # Override only if you serve media straight from MinIO (see the Caddyfile note);
  # empty falls back to WEB_URL/api/media, which works out of the box.
  MEDIA_PUBLIC_URL: ${MEDIA_PUBLIC_URL:-}
  # Bootstrap admin: created on API startup when no admin account exists yet.
  # Self-registration is gone — all accounts come from the admin panel (or a
  # teacher creating students). Empty password = generated and printed to the
  # api log once.
  ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
  TZ: ${TZ:-Europe/Moscow}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: egeism
      POSTGRES_PASSWORD: egeism
      POSTGRES_DB: egeism
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egeism"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  # One-shot: create the media bucket and make it anonymous-download (task
  # figures are unguessable content hashes; the bot/web fetch them by URL).
  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/egeism-media &&
      mc anonymous set download local/egeism-media || true"

  # One-shot: apply DB migrations, then exit. Everything else waits on it.
  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { BIN: migrate }
    restart: "no"
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy

  # Python content-fetcher (openfipi for информатика, РЕШУ for the rest).
  fetcher:
    build:
      context: ..
      dockerfile: deploy/fetcher.Dockerfile
    restart: unless-stopped
    environment:
      FETCH_DEADLINE: ${FETCH_DEADLINE:-80}
      FETCH_DELAY: ${FETCH_DELAY:-0.25}

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { BIN: api }
    restart: unless-stopped
    environment:
      <<: *app-env
      HTTP_ADDR: ":8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      fetcher:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { BIN: worker }
    restart: unless-stopped
    environment: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { BIN: bot }
    restart: unless-stopped
    environment:
      <<: *app-env
      API_BASE_URL: http://api:8080
    depends_on:
      api:
        condition: service_started

  # React SPA served by nginx; proxies /api (incl. public /api/media) to the API.
  # No host port — Caddy reverse-proxies to it on the internal network.
  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started

  # Edge reverse proxy: the ONLY service exposed to the internet. Terminates TLS
  # with automatic Let's Encrypt certs (see deploy/Caddyfile) and proxies to web.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in deploy/.env}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in deploy/.env}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  miniodata:
  caddy_data:
  caddy_config:
