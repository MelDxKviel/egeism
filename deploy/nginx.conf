server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve static assets, fall back to index.html for client routing.
    location / {
        try_files $uri /index.html;
    }

    # Proxy API + health to the Go API service on the compose network.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /health {
        proxy_pass http://api:8080;
    }
}
